name: ci

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CalloraVoipSdk.sln

      - name: Build
        run: dotnet build CalloraVoipSdk.sln --configuration Release --no-restore -p:CodeAnalysisTreatWarningsAsErrors=true

      - name: Test + Coverage (Non-Core)
        run: dotnet test CalloraVoipSdk.sln --configuration Release --no-build --filter "FullyQualifiedName!~CalloraVoipSdk.Core.Tests" --collect:"XPlat Code Coverage" --results-directory ./TestResults --nologo --verbosity minimal

      - name: Upload Coverage Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: |
            TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
