name: ci

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

# Cancel superseded runs on the same PR/branch to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore CalloraVoipSdk.sln

      - name: Build
        run: dotnet build CalloraVoipSdk.sln --configuration Release --no-restore -p:CodeAnalysisTreatWarningsAsErrors=true

      - name: Architecture gates (ENGINEERING_RULES)
        run: dotnet test tests/CalloraVoipSdk.ArchitectureTests/CalloraVoipSdk.ArchitectureTests.csproj --configuration Release --no-build --nologo --verbosity minimal

      - name: Test + Coverage (Non-Core)
        run: dotnet test CalloraVoipSdk.sln --configuration Release --no-build --filter "Category!=SoakLong&Category!=Interop&FullyQualifiedName!~ArchitectureTests" --collect:"XPlat Code Coverage" --results-directory ./TestResults --nologo --verbosity minimal

      - name: Upload Coverage Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}
          path: |
            TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn

  interop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore CalloraVoipSdk.sln

      - name: Build
        run: dotnet build CalloraVoipSdk.sln --configuration Release --no-restore

      - name: Interop tests (Docker/Asterisk)
        run: dotnet test tests/CalloraVoipSdk.InteropTests/CalloraVoipSdk.InteropTests.csproj --configuration Release --no-build -f net10.0 --filter "Category=Interop" --nologo --verbosity minimal
