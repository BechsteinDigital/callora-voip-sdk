name: packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version (e.g. 0.9.1 or 0.9.1-preview.1)
        required: true
        type: string
  push:
    tags:
      - "v*"

# Publishing goes to nuget.org via NUGET_API_KEY (not GITHUB_TOKEN), so read is enough.
permissions:
  contents: read

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore CalloraVoipSdk.sln

      - name: Build and test (release gate)
        run: |
          dotnet build CalloraVoipSdk.sln -c Release --no-restore
          dotnet test CalloraVoipSdk.sln -c Release --no-build --nologo --filter "Category!=SoakLong&Category!=Interop"

      - name: Pack CalloraVoipSdk.Core
        run: dotnet pack src/Core/CalloraVoipSdk.Core.csproj -c Release --no-restore -o artifacts/nuget /p:Version=${{ steps.version.outputs.version }}

      - name: Pack CalloraVoipSdk
        run: dotnet pack src/CalloraVoipSdk/CalloraVoipSdk.csproj -c Release --no-restore -o artifacts/nuget /p:Version=${{ steps.version.outputs.version }}

      - name: Pack CalloraVoipSdk.Client
        run: dotnet pack src/Client/CalloraVoipSdk.Client.csproj -c Release --no-restore -o artifacts/nuget /p:Version=${{ steps.version.outputs.version }}

      - name: Pack CalloraVoipSdk.Audio.Abstractions
        run: dotnet pack src/Audio/Abstractions/CalloraVoipSdk.Audio.Abstractions.csproj -c Release --no-restore -o artifacts/nuget /p:Version=${{ steps.version.outputs.version }}

      - name: Pack CalloraVoipSdk.Audio.Windows
        run: dotnet pack src/Audio/Windows/CalloraVoipSdk.Audio.Windows.csproj -c Release --no-restore -o artifacts/nuget /p:Version=${{ steps.version.outputs.version }}

      - name: Pack CalloraVoipSdk.Audio.Linux
        run: dotnet pack src/Audio/Linux/CalloraVoipSdk.Audio.Linux.csproj -c Release --no-restore -o artifacts/nuget /p:Version=${{ steps.version.outputs.version }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-${{ steps.version.outputs.version }}
          path: artifacts/nuget/*

      - name: Publish to NuGet.org
        shell: bash
        run: |
          set -euo pipefail
          SOURCE="https://api.nuget.org/v3/index.json"
          VERSION="${{ steps.version.outputs.version }}"

          dotnet nuget push "artifacts/nuget/CalloraVoipSdk.Core.${VERSION}.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "$SOURCE" --skip-duplicate
          dotnet nuget push "artifacts/nuget/CalloraVoipSdk.Client.${VERSION}.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "$SOURCE" --skip-duplicate
          dotnet nuget push "artifacts/nuget/CalloraVoipSdk.Audio.Abstractions.${VERSION}.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "$SOURCE" --skip-duplicate
          dotnet nuget push "artifacts/nuget/CalloraVoipSdk.Audio.Windows.${VERSION}.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "$SOURCE" --skip-duplicate
          dotnet nuget push "artifacts/nuget/CalloraVoipSdk.Audio.Linux.${VERSION}.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "$SOURCE" --skip-duplicate
          dotnet nuget push "artifacts/nuget/CalloraVoipSdk.${VERSION}.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "$SOURCE" --skip-duplicate
