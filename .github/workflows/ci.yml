name: ci

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore CalloraVoipSdk.sln

      - name: Build
        run: dotnet build CalloraVoipSdk.sln --configuration Release --no-restore -p:CodeAnalysisTreatWarningsAsErrors=true

      # Build validates all target frameworks (net8.0;net9.0;net10.0); tests are
      # executed on net10.0 (the global.json SDK / primary target) so a green run is
      # authoritative regardless of older shared-runtime/test-host availability.
      - name: Test + Coverage (net10.0)
        run: dotnet test CalloraVoipSdk.sln --configuration Release --no-build --framework net10.0 --filter "FullyQualifiedName!~CalloraVoipSdk.Core.Tests" --collect:"XPlat Code Coverage" --results-directory ./TestResults --nologo --verbosity minimal

      - name: Upload Coverage Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: |
            TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
